# ============================================================
# NonProd Kubernetes Manifests — lib-inventory
# Apply with: kubectl apply -f k8s/nonprod/
# ============================================================

# --- Secret ---
# The API key is NOT stored here — this is just a reference shell.
# You create the actual secret manually in Rancher (one time only):
#   Rancher UI > your project > More Resources > Core > Secrets
#   Name: lib-inventory-api-secret  |  Namespace: lib-inventory-nonprod
#   Key: ALMA_SHELFLIST_API_KEY  |  Value: <your actual API key>
# DO NOT paste your API key into this file or commit it to git.

---

# --- Deployment ---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: lib-inventory
  namespace: lib-inventory-nonprod
  labels:
    app: lib-inventory
    env: nonprod
spec:
  replicas: 1
  selector:
    matchLabels:
      app: lib-inventory
  template:
    metadata:
      labels:
        app: lib-inventory
        env: nonprod
    spec:
      containers:
        - name: lib-inventory
          # GitHub Actions replaces IMAGE_TAG_PLACEHOLDER with the git SHA on each deploy
          image: dev.image-registry.it.purdue.edu/lib-inventory/lib-inventory:IMAGE_TAG_PLACEHOLDER
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 33
            capabilities:
              drop:
                - ALL
            seccompProfile:
              type: RuntimeDefault
          env:
            - name: ALMA_SHELFLIST_API_KEY
              valueFrom:
                secretKeyRef:
                  name: lib-inventory-api-secret
                  key: ALMA_SHELFLIST_API_KEY
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "250m"
      # Tells Kubernetes how to pull from Purdue's private Harbor registry.
      # You may need to create this image pull secret — see Step 7 in the guide.
      imagePullSecrets:
        - name: harbor-nonprod-secret

---

# --- Service ---
# Internal load balancer — routes traffic to the pod on port 80.
apiVersion: v1
kind: Service
metadata:
  name: lib-inventory
  namespace: lib-inventory-nonprod
spec:
  selector:
    app: lib-inventory
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80

---

# --- Ingress ---
# Exposes the app at a public hostname.
# DNS: dev-inventory.lib.purdue.edu → dev.k8sds1.it.purdue.edu
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: lib-inventory
  namespace: lib-inventory-nonprod
  annotations:
    kubernetes.io/ingress.class: "traefik"
spec:
  rules:
    - host: dev-inventory.lib.purdue.edu
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: lib-inventory
                port:
                  number: 80
