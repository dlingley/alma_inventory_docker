name: Build and Deploy

on:
  push:
    branches:
      - master      # triggers NonProd deploy
      - production  # triggers Prod deploy

env:
  NONPROD_REGISTRY: dev.image-registry.it.purdue.edu
  PROD_REGISTRY: image-registry.it.purdue.edu
  IMAGE_NAME: lib-inventory/lib-inventory

jobs:
  build-and-push:
    name: Build image and push to Harbor
    runs-on: self-hosted

    outputs:
      registry: ${{ steps.registry.outputs.registry }}
      image_tag: ${{ steps.registry.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set registry and tag based on branch
        id: registry
        shell: pwsh
        run: |
          if ("${{ github.ref_name }}" -eq "production") {
            "registry=${{ env.PROD_REGISTRY }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "environment=prod" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "registry=${{ env.NONPROD_REGISTRY }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
            "environment=nonprod" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }
          "image_tag=${{ github.sha }}" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.registry.outputs.registry }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .docker/Dockerfile
          push: true
          tags: |
            ${{ steps.registry.outputs.registry }}/${{ env.IMAGE_NAME }}:latest
            ${{ steps.registry.outputs.registry }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy to Kubernetes
    runs-on: self-hosted
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment variables
        id: env
        shell: pwsh
        run: |
          if ("${{ github.ref_name }}" -eq "production") {
            "environment=prod" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          } else {
            "environment=nonprod" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          }

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig (prod)
        if: ${{ steps.env.outputs.environment == 'prod' }}
        shell: pwsh
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG_PROD }}
        run: |
          New-Item -ItemType Directory -Force -Path "$HOME\.kube" | Out-Null
          [System.IO.File]::WriteAllText("$HOME\.kube\config", $env:KUBECONFIG_CONTENT)
          icacls "$HOME\.kube\config" /inheritance:r /grant:r "${env:USERDOMAIN}\${env:USERNAME}:F" | Out-Null

      - name: Configure kubeconfig (nonprod)
        if: ${{ steps.env.outputs.environment == 'nonprod' }}
        shell: pwsh
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG_NONPROD }}
        run: |
          New-Item -ItemType Directory -Force -Path "$HOME\.kube" | Out-Null
          [System.IO.File]::WriteAllText("$HOME\.kube\config", $env:KUBECONFIG_CONTENT)
          icacls "$HOME\.kube\config" /inheritance:r /grant:r "${env:USERDOMAIN}\${env:USERNAME}:F" | Out-Null

      - name: Update image tag in manifest
        shell: pwsh
        run: |
          # Swap the :latest placeholder in the manifest with the exact git SHA tag
          $file = "k8s/${{ steps.env.outputs.environment }}/deployment.yaml"
          (Get-Content $file) -replace "IMAGE_TAG_PLACEHOLDER", "${{ needs.build-and-push.outputs.image_tag }}" |
            Set-Content $file

      - name: Apply Kubernetes manifests
        shell: pwsh
        run: |
          kubectl apply -f k8s/${{ steps.env.outputs.environment }}/

      - name: Wait for rollout to complete
        shell: pwsh
        run: |
          kubectl rollout status deployment/lib-inventory `
            -n lib-inventory-${{ steps.env.outputs.environment }} `
            --timeout=120s
