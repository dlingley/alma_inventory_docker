name: Build and Deploy

on:
  push:
    branches:
      - master      # triggers NonProd deploy
      - production  # triggers Prod deploy

env:
  NONPROD_REGISTRY: dev.image-registry.it.purdue.edu
  PROD_REGISTRY: image-registry.it.purdue.edu
  IMAGE_NAME: lib-inventory/lib-inventory

jobs:
  build-and-push:
    name: Build image and push to Harbor
    runs-on: ubuntu-latest

    outputs:
      registry: ${{ steps.registry.outputs.registry }}
      image_tag: ${{ steps.registry.outputs.image_tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set registry and tag based on branch
        id: registry
        run: |
          if [ "${{ github.ref_name }}" == "production" ]; then
            echo "registry=${{ env.PROD_REGISTRY }}" >> $GITHUB_OUTPUT
            echo "environment=prod" >> $GITHUB_OUTPUT
          else
            echo "registry=${{ env.NONPROD_REGISTRY }}" >> $GITHUB_OUTPUT
            echo "environment=nonprod" >> $GITHUB_OUTPUT
          fi
          echo "image_tag=${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: ${{ steps.registry.outputs.registry }}
          username: ${{ secrets.HARBOR_USERNAME }}
          password: ${{ secrets.HARBOR_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: .docker/Dockerfile
          push: true
          tags: |
            ${{ steps.registry.outputs.registry }}/${{ env.IMAGE_NAME }}:latest
            ${{ steps.registry.outputs.registry }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

  deploy:
    name: Deploy to Kubernetes
    runs-on: ubuntu-latest
    needs: build-and-push

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set environment variables
        id: env
        run: |
          if [ "${{ github.ref_name }}" == "production" ]; then
            echo "environment=prod" >> $GITHUB_OUTPUT
            echo "kubeconfig_secret=KUBECONFIG_PROD" >> $GITHUB_OUTPUT
          else
            echo "environment=nonprod" >> $GITHUB_OUTPUT
            echo "kubeconfig_secret=KUBECONFIG_NONPROD" >> $GITHUB_OUTPUT
          fi

      - name: Set up kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets[steps.env.outputs.kubeconfig_secret] }}" > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Update image tag in manifest
        run: |
          # Swap the :latest placeholder in the manifest with the exact git SHA tag
          sed -i "s|IMAGE_TAG_PLACEHOLDER|${{ needs.build-and-push.outputs.image_tag }}|g" \
            k8s/${{ steps.env.outputs.environment }}/deployment.yaml

      - name: Apply Kubernetes manifests
        run: |
          kubectl apply -f k8s/${{ steps.env.outputs.environment }}/

      - name: Wait for rollout to complete
        run: |
          kubectl rollout status deployment/lib-inventory \
            -n lib-inventory-${{ steps.env.outputs.environment }} \
            --timeout=120s
